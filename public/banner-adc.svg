<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgBanner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A2E50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldBanner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2744;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0C060;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C49030;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dividerGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A853;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#D4A853;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#D4A853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A853;stop-opacity:0" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="bannerClip">
      <rect width="1200" height="400" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgBanner)" rx="20"/>

  <!-- Decorative circles (right side, subtle) -->
  <circle cx="1050" cy="200" r="300" fill="none" stroke="#1E3A5F" stroke-width="60" opacity="0.5" clip-path="url(#bannerClip)"/>
  <circle cx="1050" cy="200" r="200" fill="none" stroke="#162D4A" stroke-width="30" opacity="0.5" clip-path="url(#bannerClip)"/>
  <circle cx="1050" cy="200" r="120" fill="none" stroke="#1A3358" stroke-width="1" opacity="0.4" clip-path="url(#bannerClip)"/>

  <!-- Top gold line -->
  <rect x="0" y="0" width="1200" height="3" fill="#D4A853" opacity="0.6" rx="2"/>
  <!-- Bottom gold line -->
  <rect x="0" y="397" width="1200" height="3" fill="#D4A853" opacity="0.6" rx="2"/>

  <!-- Corner accents top-left -->
  <path d="M0 0 L60 0 L0 60 Z" fill="#D4A853" opacity="0.15"/>
  <path d="M0 0 L30 0 L0 30 Z" fill="#D4A853" opacity="0.2"/>
  <!-- Corner accents top-right -->
  <path d="M1200 0 L1140 0 L1200 60 Z" fill="#D4A853" opacity="0.15"/>
  <path d="M1200 0 L1170 0 L1200 30 Z" fill="#D4A853" opacity="0.2"/>
  <!-- Corner accents bottom-left -->
  <path d="M0 400 L60 400 L0 340 Z" fill="#D4A853" opacity="0.15"/>
  <!-- Corner accents bottom-right -->
  <path d="M1200 400 L1140 400 L1200 340 Z" fill="#D4A853" opacity="0.15"/>

  <!-- === LEFT: Shield Logo Mark === -->
  <!-- Shield -->
  <path d="M175 75 L310 120 L310 240 C310 305 252 348 175 368 C98 348 40 305 40 240 L40 120 Z" fill="url(#shieldBanner)"/>
  <path d="M175 75 L310 120 L310 240 C310 305 252 348 175 368 C98 348 40 305 40 240 L40 120 Z" fill="none" stroke="#D4A853" stroke-width="1.8" opacity="0.9"/>

  <!-- Shield inner top highlight -->
  <path d="M175 75 L310 120 L310 160 C272 146 225 140 175 138 C125 140 78 146 40 160 L40 120 Z" fill="rgba(255,255,255,0.04)"/>

  <!-- ADC in shield -->
  <text x="175" y="248" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72" font-weight="bold"
    fill="#FFFFFF"
    letter-spacing="2"
    filter="url(#subtleGlow)">ADC</text>

  <!-- Shield gold separator -->
  <rect x="108" y="262" width="134" height="1.5" fill="url(#dividerGold)" rx="1"/>
  <circle cx="108" cy="262.75" r="2.5" fill="#D4A853" opacity="0.9"/>
  <circle cx="242" cy="262.75" r="2.5" fill="#D4A853" opacity="0.9"/>

  <!-- NOTARY in shield -->
  <text x="175" y="288" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16" font-weight="400"
    fill="#D4A853"
    letter-spacing="9">NOTARY</text>

  <!-- Vertical separator line -->
  <rect x="355" y="60" width="1.5" height="280" fill="#D4A853" opacity="0.25" rx="1"/>

  <!-- === RIGHT: Text Content === -->

  <!-- "ADC Notary" main title -->
  <text x="400" y="175" text-anchor="start"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="64" font-weight="bold"
    fill="#FFFFFF"
    letter-spacing="2"
    filter="url(#softGlow)">ADC Notary</text>

  <!-- Gold underline for title -->
  <rect x="400" y="189" width="360" height="2" fill="url(#dividerGold)" rx="1"/>

  <!-- Tagline -->
  <text x="400" y="228" text-anchor="start"
    font-family="Arial, Helvetica, sans-serif"
    font-size="19" font-weight="400"
    fill="#94A3B8"
    letter-spacing="0.5">Sistem Administrasi Terpusat untuk Notaris &amp; PPAT</text>

  <!-- Sub-description -->
  <text x="400" y="265" text-anchor="start"
    font-family="Arial, Helvetica, sans-serif"
    font-size="14" font-weight="300"
    fill="#64748B"
    letter-spacing="0.3">Kelola berkas · Pantau pembayaran · Workflow terstruktur</text>

  <!-- Feature pills -->
  <!-- Pill 1: Web -->
  <rect x="400" y="295" width="80" height="26" rx="13" fill="#1E3A5F" stroke="#D4A853" stroke-width="1" opacity="0.9"/>
  <text x="440" y="313" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11" font-weight="600"
    fill="#D4A853" letter-spacing="1">WEB</text>

  <!-- Pill 2: Android -->
  <rect x="492" y="295" width="100" height="26" rx="13" fill="#1E3A5F" stroke="#D4A853" stroke-width="1" opacity="0.9"/>
  <text x="542" y="313" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11" font-weight="600"
    fill="#D4A853" letter-spacing="1">ANDROID</text>

  <!-- Pill 3: Supabase -->
  <rect x="604" y="295" width="110" height="26" rx="13" fill="#1E3A5F" stroke="#D4A853" stroke-width="1" opacity="0.9"/>
  <text x="659" y="313" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11" font-weight="600"
    fill="#D4A853" letter-spacing="1">REALTIME</text>

  <!-- Right brand watermark -->
  <text x="1160" y="390" text-anchor="end"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11" font-weight="400"
    fill="#334155"
    letter-spacing="2">ADC NOTARY MOBILE v1.0</text>
</svg>
